<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>PDFShrink</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <h1>PDFShrink</h1>

      <div id="dropzone" class="dropzone" tabindex="0">
        <p class="dropzone-hint">把 PDF 拖到这里</p>
        <p class="dropzone-sub">或点击选择文件</p>
      </div>

      <fieldset class="presets">
        <legend>质量</legend>
        <label><input type="radio" name="preset" value="standard" checked /> 标准 (150dpi, 推荐)</label>
        <label><input type="radio" name="preset" value="high_quality" /> 高质量 (200dpi)</label>
        <label><input type="radio" name="preset" value="extreme" /> 极致压缩 (100dpi)</label>
        <label>
          <input type="radio" name="preset" value="custom" /> 自定义 dpi:
          <input id="custom-dpi" type="number" min="50" max="600" value="150" />
        </label>
      </fieldset>

      <div id="status" class="status"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
